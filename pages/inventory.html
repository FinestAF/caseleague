<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Inventory</title><link rel="stylesheet" href="../css/global.css"></head><body><main class="wrap"><section class="hero"><div class="kicker">Inventory</div><h1 class="title">Your Player Vault</h1><p class="subtitle">View your collection, filter by rarity, list cards on the marketplace or select your strongest 3 for matches.</p></section><div class="filters"><button class="active" onclick="render('All',this)">All</button><button onclick="render('Common',this)">Common</button><button onclick="render('Silver',this)">Silver</button><button onclick="render('Gold',this)">Gold</button><button onclick="render('Diamond',this)">Diamond</button></div><div class="grid grid-3" id="grid"></div></main><div class="modal" id="modal"><div class="modal-box"><div id="inspect"></div></div></div><script src="../js/shared.js"></script><script>let current='All';function render(f='All',btn){current=f;if(btn){document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}let inv=State.inv.filter(p=>f==='All'||p.rarity===f).sort((a,b)=>b.value-a.value);grid.innerHTML=inv.length?inv.map(p=>`<div onclick="show('${p.id}')">${playerHTML(p)}</div>`).join(''):`<div class="card"><h2>No players here yet</h2><p class="muted">Open cases to build your squad.</p><a class="btn btn-gold" href="open.html">Open Cases</a></div>`}function show(id){const p=State.inv.find(x=>x.id===id);if(!p)return;inspect.innerHTML=`${playerHTML(p)}<div class="grid grid-2" style="margin-top:18px"><div class="card"><h2>Suggested Listing</h2><p class="muted">Current fair value: ◈ ${p.value} LLD</p><input class="input" id="price" type="number" value="${p.value}"></div><div class="card"><h2>Actions</h2><div class="btns"><button class="btn btn-gold" onclick="listPlayer('${p.id}',price.value);modal.classList.remove('show');render(current)">Send to Marketplace</button><button class="btn btn-outline" onclick="modal.classList.remove('show')">Back</button></div></div></div>`;modal.classList.add('show')}render()</script></body></html>
