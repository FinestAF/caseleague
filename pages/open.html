<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Open Cases</title><link rel="stylesheet" href="../css/global.css"></head><body><main class="wrap"><section class="hero"><div class="kicker">Case Opening</div><h1 class="title">Chase the Walkout</h1><p class="subtitle">Open a Standard or Rare case. Every case reveals 6 players and saves them to your inventory after the animation.</p><div class="btns"><button id="stdBtn" class="btn btn-gold" onclick="setType('std')">Standard Case</button><button id="rareBtn" class="btn btn-outline" onclick="setType('rare')">Rare Case</button><button id="openBtn" class="btn btn-outline" onclick="openCase()">Open Case</button></div></section><div class="spin-wrap"><div class="needle"></div><div class="spin-track" id="track"></div></div></main><div class="modal" id="modal"><div class="modal-box"><div class="kicker" id="modalKicker">Results</div><h2 class="section-title" id="modalTitle">Case Opened</h2><div class="grid grid-3" id="results"></div><div class="btns"><button class="btn btn-gold" onclick="modal.classList.remove('show')">Save to Inventory</button><a class="btn btn-outline" href="inventory.html">View Inventory</a><button class="btn btn-outline" onclick="modal.classList.remove('show');openCase()">Open Another</button></div></div></div><script src="../js/shared.js"></script><script>let type='std', last=[];function setType(t){type=t;stdBtn.className='btn '+(t==='std'?'btn-gold':'btn-outline');rareBtn.className='btn '+(t==='rare'?'btn-gold':'btn-outline');openBtn.textContent='Open '+(t==='std'?'Standard':'Rare')+' Case';fillTrack()}function fillTrack(real=[]){let arr=[];for(let i=0;i<44;i++)arr.push(makePlayer(rarityRoll([['Common',58],['Silver',28],['Gold',11],['Diamond',3]])));if(real.length)arr.splice(28,6,...real);track.style.transition='none';track.style.transform='translateX(0)';track.innerHTML=arr.map(p=>playerHTML(p,true)).join('')}function openCase(){if(type==='std'&&State.std<1)return toast('No Standard Cases left.');if(type==='rare'&&State.rare<1)return toast('No Rare Cases left.'); if(type==='std')State.std-=1;else State.rare-=1;last=type==='std'?openStandard():openRare();fillTrack(last);setTimeout(()=>{track.style.transition='transform 4.2s cubic-bezier(.12,.6,.16,1)';track.style.transform='translateX(-4200px)'},60);setTimeout(()=>{addInventory(last);let best=last.includes(last.find(p=>p.rarity==='Diamond'))?'Diamond':last.some(p=>p.rarity==='Gold')?'Gold':last.some(p=>p.rarity==='Silver')?'Silver':'Common';modalKicker.textContent=best+' reveal';modalTitle.textContent=best==='Diamond'?'DIAMOND WALKOUT':best==='Gold'?'Gold Pull':'Case Results';results.innerHTML=last.map(playerHTML).join('');modal.classList.add('show')},4550)}setType('std')</script></body></html>
