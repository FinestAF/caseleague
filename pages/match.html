<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quick Match</title><link rel="stylesheet" href="../css/global.css"></head><body><main class="wrap"><section class="hero"><div class="kicker">Quick Play League</div><h1 class="title">3v3 Division Match</h1><p class="subtitle">Select exactly 3 cards from your inventory. The 90 minute game is simulated instantly in this demo, with rewards based on your division.</p></section><h2 class="section-title">Select Squad</h2><div class="grid grid-3" id="squad"></div><div class="btns"><button class="btn btn-gold" onclick="play()">Start Match</button><a class="btn btn-outline" href="open.html">Need Players?</a></div><div id="result"></div></main><script src="../js/shared.js"></script><script>let selected=[];function render(){let inv=State.inv.sort((a,b)=>b.rating-a.rating);squad.innerHTML=inv.length?inv.map(p=>`<div onclick="toggle('${p.id}')" style="outline:${selected.includes(p.id)?'3px solid var(--gold2)':'0'};border-radius:18px">${playerHTML(p)}</div>`).join(''):`<div class="card"><h2>No players yet</h2><p class="muted">Open a case first.</p></div>`}function toggle(id){selected=selected.includes(id)?selected.filter(x=>x!==id):(selected.length<3?[...selected,id]:selected);render()}function play(){if(selected.length!==3)return toast('Select exactly 3 players.');let team=selected.map(id=>State.inv.find(p=>p.id===id));let r=simulate(team);result.innerHTML=`<h2 class="section-title">Match Result</h2><div class="card"><div class="score">${r.us} - ${r.es}</div><p class="muted" style="text-align:center">Reward: ◈ ${r.reward} LLD · Current Division: D${State.division}</p><div class="grid grid-2"><div><h2>Your Squad</h2><div class="grid">${team.map(playerHTML).join('')}</div></div><div><h2>Commentary</h2><div class="commentary">${r.log.slice(-18).map(x=>`<p>${x}</p>`).join('')||'<p>Tactical stalemate. No major highlights.</p>'}</div></div></div></div>`;refreshNavbar()}render()</script></body></html>
