<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marketplace</title><link rel="stylesheet" href="../css/global.css"></head><body><main class="wrap"><section class="hero"><div class="kicker">Marketplace</div><h1 class="title">Trade the Meta</h1><p class="subtitle">Buy and sell player cards. Each completed sale takes a 20% admin fee, keeping the economy controlled.</p></section><h2 class="section-title">Live Listings</h2><div class="grid grid-3" id="listings"></div></main><script src="../js/shared.js"></script><script>function render(){seededListings();listings.innerHTML=State.listings.sort((a,b)=>b.price-a.price).map(p=>`<div class="card">${playerHTML(p)}<div class="btns"><button class="btn btn-gold" onclick="buyListing('${p.id}');render()">Buy ◈ ${p.price}</button>${p.seller===State.username?`<button class="btn btn-danger" onclick="removeListing('${p.id}');render()">Remove</button>`:''}</div><p class="muted">Seller: ${p.seller||'Market'}</p></div>`).join('')}render()</script></body></html>
